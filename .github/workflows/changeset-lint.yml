name: Changeset Lint

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Require Changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Check for changeset
        run: npx changeset status --since=origin/main