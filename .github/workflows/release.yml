name: "Automatic Release & Changelog"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npx @changesets/cli version
          publish: npx @changesets/cli tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push Tags
        if: steps.changesets.outputs.published == 'true' || contains(github.event.head_commit.message, 'chore: version packages')
        run: git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create GitHub Release
        if: |
          steps.changesets.outputs.published == 'true' || 
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, 'chore: version packages'))
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true 
          tag_name: ${{ steps.changesets.outputs.publishedPackages[0].tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}