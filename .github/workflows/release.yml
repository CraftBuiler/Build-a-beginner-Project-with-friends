name: "Automatic Release & Changelog"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required: allows the action to push commits/tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create Release PR or Apply Versions + Tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version        # bumps package.json + updates CHANGELOG.md
          publish: npm run release        # runs changeset tag + git push --tags
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only runs when the "Version Packages" PR was merged (publish step ran)
      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # Read the tag from publishedPackages, with a fallback
          tag_name: ${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version && format('v{0}', fromJson(steps.changesets.outputs.publishedPackages)[0].version) }}
          body_path: CHANGELOG.md          # use your actual changelog, not auto-generated
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}